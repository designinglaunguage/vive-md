기업서비스 = 3~4건
연구기술 = 3~4건

[주간브리프]
총건수 = 12~18건
수집범위 = 최근 1주일
AI정책시장 = 3~5건
기업서비스 = 4~6건
연구기술 = 4~6건

[지역균형]
미국 = 3~4건
중국 = 2~3건
한국 = 2~3건
유럽일본 = 1~2건

; ── 검색 대상 사이트 ──
; 사이트를 추가/삭제하려면 쉼표로 구분하여 수정하세요.
; 형식: 사이트명(도메인)

[미국사이트]
사이트 = The Verge(theverge.com), TechCrunch(techcrunch.com), VentureBeat(venturebeat.com), Ars Technica(arstechnica.com), MIT Technology Review(technologyreview.com)
키워드 = AI, artificial intelligence, LLM, machine learning, GPT, Claude, vibe coding, AI robot, humanoid, AI agent

[중국사이트]
사이트 = 36氪(36kr.com), 机器之心(jiqizhixin.com), 量子位(qbitai.com)
키워드 = 人工智能, 大模型, AI芯片, 机器学习, AI机器人, 人形机器人, 氛围编程

[한국사이트]
사이트 = 전자신문(etnews.com), AI타임스(aitimes.com), 디지털데일리(ddaily.co.kr), ZDNet Korea(zdnet.co.kr)
키워드 = 인공지능, AI, 생성AI, LLM, 거대언어모델, 바이브코딩, AI로봇, 휴머노이드, AI에이전트

[유럽일본사이트]
사이트 = Reuters(reuters.com), Bloomberg(bloomberg.com), 日経クロステック(xtech.nikkei.com)
키워드 = artificial intelligence, generative AI, 人工知能, humanoid robot, vibe coding

; ── 섹션 분류 기준 ──

[AI정책시장동향]
포함 = AI 규제/정책, 시장 전망/보고서, 투자/펀딩, AI 윤리/안전, 국가 AI 전략
제외 = 개별 기업 제품 출시

[기업서비스동향]
포함 = AI 제품/서비스 출시, 기업 AI 전략, M&A/파트너십, AI 스타트업, 플랫폼 업데이트, AI 로봇/휴머노이드
제외 = 순수 연구 논문

[연구기술동향]
포함 = AI 모델/아키텍처, 벤치마크 결과, 오픈소스 모델, AI 칩/하드웨어, 새로운 기법/알고리즘, 바이브코딩 도구, AI 에이전트
제외 = 정부 정책

; ── 작성 규칙 ──

[작성규칙]
서술어 = 명사형 통일 (예: ~발표, ~공개, ~출시, ~달성)
회사명 = 한국 회사 외 영어 표기 (예: OpenAI, Google, Anthropic, Meta)
요약길이 = 3~5문장
